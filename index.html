<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!--
      Content Security Policy — defence-in-depth against XSS.
      'unsafe-eval' is required by pdfjs-dist; 'wasm-unsafe-eval' by
      tesseract.js. 'unsafe-inline' on style is required by Tailwind +
      React's inline style attribute usage.
      cdn.jsdelivr.net is allowed because tesseract.js loads its worker
      script, WASM core, and English training data from there. Without
      this whitelist, OCR fallback silently fails when the parser hits
      a PDF whose text layer can't be cleanly extracted.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' blob: https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; child-src 'self' blob: https://cdn.jsdelivr.net; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="Understand your semen analysis report in plain English. Get personalised next steps based on WHO 2021 guidelines. Free, private tool by ForMen Health." />
    <meta name="keywords" content="semen analysis, sperm test, male fertility, WHO 2021, sperm count, motility, morphology, fertility report, ForMen Health" />
    <meta name="author" content="ForMen Health" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="FM Lab Report Explainer — Understand Your Semen Analysis" />
    <meta property="og:description" content="Enter your semen analysis values and get a personalised explanation in plain English. Free, private, no sign-up required." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://formen.health/pages/lab-report-explainer" />
    <meta property="og:site_name" content="ForMen Health" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FM Lab Report Explainer — Understand Your Semen Analysis" />
    <meta name="twitter:description" content="Enter your semen analysis values and get a personalised explanation in plain English. Free, private, no sign-up required." />

    <!-- Canonical -->
    <link rel="canonical" href="https://formen.health/pages/lab-report-explainer" />

    <!-- Favicon + Apple touch icon — explicit links to the brand asset
         to resolve 404s and ensure the logo appears in the browser tab. -->
    <link rel="icon" type="image/png" href="/formen-logo.png" />
    <link rel="icon" type="image/x-icon" href="/formen-logo.png" />
    <link rel="apple-touch-icon" href="/formen-logo.png" />

    <title>FM Lab Report Explainer — Understand Your Semen Analysis | ForMen Health</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
